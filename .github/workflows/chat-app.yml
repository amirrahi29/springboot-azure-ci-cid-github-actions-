# Push dev | staging | uat → Docker build/push → Helm deploy (ek hi workflow, ek job)
# Prereqs: AZURE_CREDENTIALS secret; AKS ↔ ACR pull (e.g. --attach-acr)
name: Build, Push & Deploy to AKS

on:
  push:
    branches:
      - dev
      - staging
      - uat

env:
  DOCKER_BUILDKIT: 1
  ACR_NAME: chatappregsistry
  IMAGE_NAME: chat-app
  AKS_CLUSTER_NAME: ChatAppCluster
  AKS_RESOURCE_GROUP: ChatResourceGroup

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set image tag and namespace
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=${BRANCH}-${SHORT_SHA}" >> $GITHUB_ENV
          echo "DEPLOY_NAMESPACE=${BRANCH}" >> $GITHUB_ENV

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build image (Spring Boot)
        run: |
          echo "Building: $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG"
          docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG .

      - name: Push image to ACR
        run: "docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG"

      - name: Set AKS kubeconfig
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Helm upgrade (chat-app)
        run: |
          helm upgrade --install chat-app ./helm \
            --namespace "$DEPLOY_NAMESPACE" \
            --create-namespace \
            -f "helm/values-${DEPLOY_NAMESPACE}.yaml" \
            --set image.repository=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }} \
            --set image.tag=$IMAGE_TAG \
            --wait --timeout 5m

      - name: Summary
        run: |
          echo "Namespace: $DEPLOY_NAMESPACE"
          echo "Image: $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG"
