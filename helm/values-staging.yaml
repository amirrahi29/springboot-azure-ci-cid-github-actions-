# Staging — branch `staging` → namespace `staging` → tag `staging-<sha>` → helm/values-staging.yaml
# CI: .github/workflows/chat-app.yml

replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

podAnnotations:
  environment: staging

service:
  type: LoadBalancer

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: app-staging.mergeai.in
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
